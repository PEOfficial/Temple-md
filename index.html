<h1>WhatsApp Bot Panel</h1>

<input id="id" placeholder="Session ID">
<button onclick="create()">Create Session</button>

<br><br>

<input id="number" placeholder="WhatsApp Number">
<button onclick="pair()">Get Pairing Code</button>

<p id="output"></p>

<script>
const API = "http://localhost:3000";

async function create() {
  let id = document.getElementById("id").value;

  await fetch(API + "/session/create", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });

  document.getElementById("output").innerText = "Session created";
}

async function pair() {
  let id = document.getElementById("id").value;
  let number = document.getElementById("number").value;

  let res = await fetch(API + "/session/pair", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id, number })
  });

  let data = await res.json();

  document.getElementById("output").innerText =
    data.code ? "Code: " + data.code : "Error";
}
</script>
